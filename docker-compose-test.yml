# =============================================================================
# PostgreSQL 双机热备 - 本地测试用编排 (同时拉起主备两个节点)
# 用法：docker compose -f docker-compose-test.yml up -d
# =============================================================================

networks:
  ha-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.40.0.0/24

services:
  pg-node1:
    image: postgres-ha:1.0
    container_name: pg-node1
    hostname: pg-node1
    networks:
      ha-net:
        ipv4_address: 172.40.0.11
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
    environment:
      - NODE_ROLE=primary
      - NODE_ID=1
      - NODE_NAME=pg-node1
      - REPMGR_PASSWORD=repmgr123
      - NODE_IP=172.40.0.11
      - PARTNER_IP=172.40.0.12
      - NODE_VIP=172.40.0.100
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-JvUcMbDxjYY4M8sj}
      - POSTGRES_DB=${POSTGRES_DB:-thingsboard}
      - PGDATA=/var/lib/postgresql/data
      - PG_PORT=${PG_PORT:-5432}
      - WECOM_NOTIFY_ENABLED=${WECOM_NOTIFY_ENABLED:-false}
      - WECOM_WEBHOOK_URL=${WECOM_WEBHOOK_URL:-}
      - WECOM_NOTIFY_SITE_NAME=${WECOM_NOTIFY_SITE_NAME:-本地联调环境}
      - WECOM_NOTIFY_TIMEOUT=${WECOM_NOTIFY_TIMEOUT:-10}
      - WECOM_NOTIFY_AT_ALL_ON_FAILOVER=${WECOM_NOTIFY_AT_ALL_ON_FAILOVER:-false}
      - WAL_ARCHIVE_ENABLED=${WAL_ARCHIVE_ENABLED:-true}
      - WAL_ARCHIVE_DIR=${WAL_ARCHIVE_DIR:-/var/lib/postgresql/wal-archive}
      - WAL_RECEIVER_ENABLED=${WAL_RECEIVER_ENABLED:-true}
      - WAL_ARCHIVE_CLEANUP_ENABLED=${WAL_ARCHIVE_CLEANUP_ENABLED:-true}
      - WAL_ARCHIVE_MAX_SIZE_MB=${WAL_ARCHIVE_MAX_SIZE_MB:-10240}
      - WAL_ARCHIVE_MIN_KEEP_SEGMENTS=${WAL_ARCHIVE_MIN_KEEP_SEGMENTS:-64}
      - TZ=${TZ:-Asia/Shanghai}
      - HA_LOG_MAX_SIZE_MB=${HA_LOG_MAX_SIZE_MB:-20}
      - HA_LOG_KEEP_FILES=${HA_LOG_KEEP_FILES:-5}
      - HA_PG_LOG_KEEP_FILES=${HA_PG_LOG_KEEP_FILES:-10}
      - HA_LOG_SWEEP_INTERVAL_SECS=${HA_LOG_SWEEP_INTERVAL_SECS:-60}
    volumes:
      - pgdata_node1:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal-archive
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-5}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p ${PG_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pg-node2:
    image: postgres-ha:1.0
    container_name: pg-node2
    hostname: pg-node2
    networks:
      ha-net:
        ipv4_address: 172.40.0.12
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
    environment:
      - NODE_ROLE=standby
      - NODE_ID=2
      - NODE_NAME=pg-node2
      - REPMGR_PASSWORD=repmgr123
      - NODE_IP=172.40.0.12
      - PARTNER_IP=172.40.0.11
      - NODE_VIP=172.40.0.100
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-JvUcMbDxjYY4M8sj}
      - POSTGRES_DB=${POSTGRES_DB:-thingsboard}
      - PGDATA=/var/lib/postgresql/data
      - PG_PORT=${PG_PORT:-5432}
      - WECOM_NOTIFY_ENABLED=${WECOM_NOTIFY_ENABLED:-false}
      - WECOM_WEBHOOK_URL=${WECOM_WEBHOOK_URL:-}
      - WECOM_NOTIFY_SITE_NAME=${WECOM_NOTIFY_SITE_NAME:-本地联调环境}
      - WECOM_NOTIFY_TIMEOUT=${WECOM_NOTIFY_TIMEOUT:-10}
      - WECOM_NOTIFY_AT_ALL_ON_FAILOVER=${WECOM_NOTIFY_AT_ALL_ON_FAILOVER:-false}
      - WAL_ARCHIVE_ENABLED=${WAL_ARCHIVE_ENABLED:-true}
      - WAL_ARCHIVE_DIR=${WAL_ARCHIVE_DIR:-/var/lib/postgresql/wal-archive}
      - WAL_RECEIVER_ENABLED=${WAL_RECEIVER_ENABLED:-true}
      - WAL_ARCHIVE_CLEANUP_ENABLED=${WAL_ARCHIVE_CLEANUP_ENABLED:-true}
      - WAL_ARCHIVE_MAX_SIZE_MB=${WAL_ARCHIVE_MAX_SIZE_MB:-10240}
      - WAL_ARCHIVE_MIN_KEEP_SEGMENTS=${WAL_ARCHIVE_MIN_KEEP_SEGMENTS:-64}
      - TZ=${TZ:-Asia/Shanghai}
      - HA_LOG_MAX_SIZE_MB=${HA_LOG_MAX_SIZE_MB:-20}
      - HA_LOG_KEEP_FILES=${HA_LOG_KEEP_FILES:-5}
      - HA_PG_LOG_KEEP_FILES=${HA_PG_LOG_KEEP_FILES:-10}
      - HA_LOG_SWEEP_INTERVAL_SECS=${HA_LOG_SWEEP_INTERVAL_SECS:-60}
    volumes:
      - pgdata_node2:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal-archive
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-5}"
    depends_on:
      pg-node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p ${PG_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata_node1:
    driver: local
  pgdata_node2:
    driver: local
  wal_archive:
    driver: local
