# =============================================================================
# Keepalived 配置 - Node1 (默认 Primary，优先级较高)
# 功能：通过 VRRP 管理虚拟 IP，确保 VIP 始终指向当前 Primary
# =============================================================================

global_defs {
    router_id PG_HA_NODE1
    enable_script_security
    script_user root
}

# ---------------------------------------------------------------------------
# 健康检查脚本 - 检测本地 PostgreSQL 是否为 Primary
# ---------------------------------------------------------------------------
vrrp_script check_pg {
    script "/usr/local/bin/check_postgres.sh"
    interval 1          # 每 1 秒检查一次
    fall 2              # 连续 2 次失败才判定不健康
    rise 1              # 连续 1 次成功恢复健康
}

# ---------------------------------------------------------------------------
# VRRP 实例 - PostgreSQL 高可用
# ---------------------------------------------------------------------------
vrrp_instance VI_PG {
    # 两节点都设为 BACKUP，通过 priority 选举
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 101
    advert_int 1
    down_timer_adverts 1

    # 禁止抢占 - 避免旧 Primary 恢复后自动抢回 VIP
    nopreempt

    # 使用单播模式（兼容性更好，无需多播支持）
    unicast_src_ip 192.168.1.11
    unicast_peer {
        192.168.1.12
    }

    # VRRP 认证
    authentication {
        auth_type PASS
        auth_pass pgha2024
    }

    # 虚拟 IP 地址
    virtual_ipaddress {
        192.168.1.100/24
    }

    # 绑定健康检查；脚本失败时实例进入 FAULT，不再持有 VIP
    track_script {
        check_pg
    }

    notify_master "/usr/local/bin/keepalived-notify.sh MASTER"
    notify_backup "/usr/local/bin/keepalived-notify.sh BACKUP"
    notify_fault "/usr/local/bin/keepalived-notify.sh FAULT"
    notify_stop "/usr/local/bin/keepalived-notify.sh STOP"
}
