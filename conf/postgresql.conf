# =============================================================================
# PostgreSQL 15.4 高可用配置
# 用途：支持 repmgr 流复制与自动故障转移
# =============================================================================

# ---------------------------------------------------------------------------
# 连接设置
# ---------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 200

# ---------------------------------------------------------------------------
# WAL（预写日志）配置 - 流复制必须
# ---------------------------------------------------------------------------
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = '512MB'
wal_log_hints = on

# ---------------------------------------------------------------------------
# 热备配置 - 允许 Standby 节点接受只读查询
# ---------------------------------------------------------------------------
hot_standby = on
hot_standby_feedback = on

# ---------------------------------------------------------------------------
# 归档配置（可选，用于 PITR 点恢复）
# ---------------------------------------------------------------------------
archive_mode = on
archive_command = '/bin/true'
recovery_target_timeline = 'latest'

# ---------------------------------------------------------------------------
# repmgr 扩展 - 必须预加载
# ---------------------------------------------------------------------------
shared_preload_libraries = 'repmgr'

# ---------------------------------------------------------------------------
# 日志配置
# ---------------------------------------------------------------------------
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_statement = 'ddl'
log_min_duration_statement = 1000
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %q%u@%d '

# ---------------------------------------------------------------------------
# 性能调优（根据实际内存调整）
# ---------------------------------------------------------------------------
shared_buffers = '256MB'
effective_cache_size = '768MB'
work_mem = '8MB'
maintenance_work_mem = '128MB'
