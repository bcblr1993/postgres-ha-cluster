# =============================================================================
# repmgr 配置 - Node1 (默认 Primary)
# =============================================================================

# ---------------------------------------------------------------------------
# 节点标识
# ---------------------------------------------------------------------------
node_id=1
node_name='pg-node1'
conninfo='host=192.168.1.11 user=repmgr dbname=repmgr connect_timeout=2 application_name=pg-node1'
data_directory='/var/lib/postgresql/data'

# ---------------------------------------------------------------------------
# 自动故障转移配置
# ---------------------------------------------------------------------------
failover=automatic
promote_command='/usr/bin/repmgr standby promote -f /etc/repmgr.conf --log-to-file'
follow_command='/usr/bin/repmgr standby follow -f /etc/repmgr.conf --log-to-file --upstream-node-id=%n'

# ---------------------------------------------------------------------------
# 监控参数
# ---------------------------------------------------------------------------
monitoring_history=yes
monitor_interval_secs=2
reconnect_attempts=3
reconnect_interval=3
connection_check_type=ping
node_rejoin_timeout=180
standby_reconnect_timeout=180

# ---------------------------------------------------------------------------
# 事件通知钩子
# ---------------------------------------------------------------------------
event_notification_command='/usr/local/bin/repmgr-event-hook.sh %n %e %s "%t" "%d"'
event_notifications='standby_promote,standby_follow,repmgrd_failover_promote,repmgrd_failover_follow'

# ---------------------------------------------------------------------------
# 服务管理命令
# ---------------------------------------------------------------------------
service_start_command='pg_ctl -D /var/lib/postgresql/data start'
service_stop_command='pg_ctl -D /var/lib/postgresql/data stop -m fast'
service_restart_command='pg_ctl -D /var/lib/postgresql/data restart'
service_reload_command='pg_ctl -D /var/lib/postgresql/data reload'

# ---------------------------------------------------------------------------
# 日志配置
# ---------------------------------------------------------------------------
log_level=INFO
log_file='/var/log/repmgr/repmgr.log'
log_status_interval=300
