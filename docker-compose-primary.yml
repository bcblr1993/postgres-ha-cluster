# =============================================================================
# PostgreSQL 双机热备 - 主节点编排 (Node 1)
# 用法：docker compose -f docker-compose-primary.yml up -d
# =============================================================================

services:
  postgres-ha:
    image: postgres-ha:1.0
    container_name: postgres-ha
    hostname: pg-node1
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
    environment:
      - NODE_ROLE=primary
      - NODE_ID=1
      - NODE_NAME=pg-node1
      - REPMGR_PASSWORD=repmgr123
      - NODE_IP=${NODE_IP}
      - PARTNER_IP=${PARTNER_IP}
      - NODE_VIP=${NODE_VIP}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/current
      - PG_PORT=${PG_PORT:-5432}
      - WECOM_NOTIFY_ENABLED=${WECOM_NOTIFY_ENABLED:-false}
      - WECOM_WEBHOOK_URL=${WECOM_WEBHOOK_URL:-}
      - WECOM_NOTIFY_SITE_NAME=${WECOM_NOTIFY_SITE_NAME:-PostgreSQL HA现场}
      - WECOM_NOTIFY_TIMEOUT=${WECOM_NOTIFY_TIMEOUT:-10}
      - WECOM_NOTIFY_AT_ALL_ON_FAILOVER=${WECOM_NOTIFY_AT_ALL_ON_FAILOVER:-false}
      - WAL_ARCHIVE_ENABLED=${WAL_ARCHIVE_ENABLED:-false}
      - WAL_ARCHIVE_DIR=${WAL_ARCHIVE_DIR:-/var/lib/postgresql/wal-archive}
      - WAL_RECEIVER_ENABLED=${WAL_RECEIVER_ENABLED:-false}
      - WAL_ARCHIVE_CLEANUP_ENABLED=${WAL_ARCHIVE_CLEANUP_ENABLED:-false}
      - WAL_ARCHIVE_MAX_SIZE_MB=${WAL_ARCHIVE_MAX_SIZE_MB:-10240}
      - WAL_ARCHIVE_MIN_KEEP_SEGMENTS=${WAL_ARCHIVE_MIN_KEEP_SEGMENTS:-64}
      - TZ=${TZ:-Asia/Shanghai}
      - HA_LOG_MAX_SIZE_MB=${HA_LOG_MAX_SIZE_MB:-20}
      - HA_LOG_KEEP_FILES=${HA_LOG_KEEP_FILES:-5}
      - HA_PG_LOG_KEEP_FILES=${HA_PG_LOG_KEEP_FILES:-10}
      - HA_LOG_SWEEP_INTERVAL_SECS=${HA_LOG_SWEEP_INTERVAL_SECS:-60}
      - HA_PGDATA_WORK_ROOT=${HA_PGDATA_WORK_ROOT:-/var/lib/postgresql/data}
      - HA_RETAINED_PGDATA_DIR=${HA_RETAINED_PGDATA_DIR:-/var/lib/postgresql/data/pg-ha-retained-before-clone}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ${WAL_ARCHIVE_PATH:-./.wal}:/var/lib/postgresql/wal-archive
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-5}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p ${PG_PORT:-5432}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
    driver: local
